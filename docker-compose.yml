version: '3.8'

services:
  saas-product-1:
    image: aditya1789/saas-product1
    ports:
      - "4001:4001"
  zookeeper:
    image: zookeeper
    ports:
      - "2181:2181"
  
  kafka:
    image: confluentinc/cp-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 192.168.29.198:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://192.168.29.198:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
    depends_on:
      - zookeeper