<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <style>
            body {
                margin: 0;
                padding: 30px;
                background-color: #f0f4f8;
                font-family: 'Segoe UI', sans-serif;
                color: #333;
            }

            .email-container {
                max-width: 600px;
                margin: 0 auto;
                background: #ffffff;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.08);
            }

            .header {
                text-align: center;
                margin-bottom: 30px;
            }

            .header img {
                width: 200px;
                height: auto;
            }

            .info {
                font-size: 16px;
                line-height: 1.8;
                padding: 0 20px;
            }

            .info p {
                margin: 10px 0;
            }

            .info strong {
                color: #000;
            }

            .playstore {
                text-align: center;
                margin-top: 40px;
            }

            .playstore p {
                margin-bottom: 10px;
                font-weight: 500;
                color: #6b7280;
            }

            .playstore img {
                width: 180px;
                height: auto;
            }
        </style>
    </head>
    <body>
        <div class="email-container">
            <div class="header">
                <img
                    src="https://saas-product-one.s3.ap-south-1.amazonaws.com/email_logo.png"
                    alt="Udhyogsathi Logo"
                />
            </div>

            <div class="info">
                <p><strong>Username:</strong> <%= USERNAME %></p>
                <p><strong>Email:</strong> <%= EMAIL %></p>
                <p><strong>Password:</strong> <%= PASSWORD %></p>
                <p><strong>Organization(s):</strong> <%= ORGANIZATIONS %></p>
            </div>

            <div class="playstore">
                <p>Download the Udhyogsathi Android App:</p>
                <a
                    href="https://play.google.com/store/apps/details?id=com.udhyogsathi"
                    target="_blank"
                >
                    <img
                        src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png"
                        alt="Get it on Google Play"
                    />
                </a>
            </div>
        </div>
    </body>
</html>
